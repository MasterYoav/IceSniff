name: macOS Release Smoke

on:
  workflow_dispatch:

jobs:
  macos-release-smoke:
    name: macOS Release Smoke
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Wireshark.app
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install --cask wireshark

      - name: Download matching Wireshark source archive
        run: |
          set -euo pipefail
          version="$(sed -E 's/.*Wireshark\) ([0-9]+\.[0-9]+\.[0-9]+).*/\1/' Sources/IceSniffMac/Resources/BundledTShark/WIRESHARK_VERSION.txt)"
          archive="wireshark-${version}.tar.xz"
          archive_path="$PWD/build/release/$archive"
          mkdir -p "$PWD/build/release"
          curl -fL "https://www.wireshark.org/download/src/all-versions/$archive" -o "$archive_path"
          echo "ICESNIFF_WIRESHARK_SOURCE_ARCHIVE=$archive_path" >> "$GITHUB_ENV"

      - name: Build unsigned release package
        env:
          ICESNIFF_ALLOW_MISSING_SUPABASE_CONFIG: "1"
        run: ./scripts/release-macos.sh

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IceSniffMac-release
          path: |
            apps/macos/build/release/IceSniffMac.zip
            /tmp/icesniff-macos-derived-data/Build/Products/Release/IceSniffMac.app
          if-no-files-found: error
