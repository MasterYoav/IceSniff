name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "codex/**"
  pull_request:
    branches:
      - main

jobs:
  cli-rust:
    name: CLI Rust Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --locked --workspace --lib --bins

  live-web:
    name: Live Web App Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/live
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check browser app script syntax
        run: node --check public/app.js

      - name: Check local web server syntax
        run: node --check server.mjs

  macos-rust-engine:
    name: macOS Rust Engine Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/macos/rust-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --locked

  macos-app:
    name: macOS App Build And Tests
    runs-on: macos-15
    needs:
      - macos-rust-engine
    defaults:
      run:
        working-directory: apps/macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Resolve Swift package dependencies
        run: swift package resolve

      - name: Build macOS package
        run: swift build

      - name: Run macOS tests
        run: swift test
